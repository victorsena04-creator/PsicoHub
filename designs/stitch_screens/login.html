<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - PsicoHub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

                      "on-tertiary-fixed-variant": "#2f2ebe",
                      "outline-variant": "#c7c4d8",

                      "error-container": "#ffdad6",
                      "tertiary": "#3130c0",
                      "on-primary": "#ffffff",
                      "on-secondary": "#ffffff",
                      "surface-tint": "#4d44e3",
                      "on-secondary-fixed-variant": "#005049",
                      "on-primary-fixed-variant": "#3323cc",
                      "surface": "#faf8ff",
                      "outline": "#777587",
                      "primary": "#3525cd",
                      "secondary-container": "#86f2e4",
                      "background": "#faf8ff",
                      "on-error-container": "#93000a",
                      "surface-container-lowest": "#ffffff",
                      "on-error": "#ffffff",
                      "on-surface-variant": "#464555",
                      "inverse-surface": "#283044",
                      "surface-variant": "#dae2fd",
                      "on-primary-container": "#dad7ff",
                      "inverse-on-surface": "#eef0ff",
                      "surface-container-low": "#f2f3ff",
                      "inverse-primary": "#c3c0ff",
                      "surface-bright": "#faf8ff",
                      "tertiary-fixed": "#e1e0ff",
                      "primary-fixed-dim": "#c3c0ff",
                      "surface-container": "#eaedff",
                      "surface-container-high": "#e2e7ff",
                      "primary-fixed": "#e2dfff",
                      "on-secondary-fixed": "#00201d",
                      "on-surface": "#131b2e",
                      "secondary": "#006a61",
                      "on-background": "#131b2e",
                      "on-tertiary-container": "#d9d8ff",
                      "surface-dim": "#d2d9f4",
                      "on-tertiary-fixed": "#07006c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "4px",
                      "2xl": "48px",
                      "container-max": "1440px",
                      "xs": "4px",
                      "sidebar-width": "240px",
                      "md": "16px",
                      "lg": "24px",
                      "sm": "8px",
                      "xl": "32px"
              },
              "fontFamily": {
                      "label-md": ["Inter"],
                      "body-lg": ["Inter"],

              },
              "fontSize": {

                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "mono-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "headline-lg": ["30px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-surface p-4 md:p-8 antialiased selection:bg-primary-container/20 selection:text-primary">
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl border border-outline-variant p-8 md:p-10 shadow-[0_10px_15px_-3px_rgb(0,0,0,0.05)] flex flex-col relative z-10 overflow-hidden">
<!-- Subtle gradient orb behind card for atmosphere -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<!-- Logo & Header -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">psychology</span>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">PsicoHub</h1>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Bem-vindo de volta</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Insira suas credenciais para acessar seu consultório.</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5 w-full" method="POST" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed" id="email" name="email" placeholder="nome@exemplo.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1.5">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="password">Senha</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors hover:underline underline-offset-2" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full h-10 rounded-lg bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-on-primary-fixed-variant transition-colors active:scale-[0.98] shadow-sm" type="submit">
                Acessar
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-6 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Ainda não tem conta? 
                <a class="font-label-md text-primary hover:text-on-primary-fixed-variant hover:underline underline-offset-2 transition-colors" href="#">Cadastre-se</a>
</p>
</div>
<!-- Footer / Identity Distinction -->
<div class="mt-8 pt-6 border-t border-outline-variant flex flex-col items-center justify-center gap-3">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Gestão Unificada</span>
<div class="flex items-center gap-3">
<div class="flex items-center gap-1.5 bg-primary/10 border border-primary/20 px-2 py-1 rounded">
<span class="material-symbols-outlined text-primary text-[14px]">domain</span>
<span class="font-label-sm text-label-sm text-primary font-semibold">PJ Business</span>
</div>
<span class="text-outline-variant text-xs">&amp;</span>
<div class="flex items-center gap-1.5 bg-secondary/10 border border-secondary/20 px-2 py-1 rounded">
<span class="material-symbols-outlined text-secondary text-[14px]">person</span>
<span class="font-label-sm text-label-sm text-secondary font-semibold">PF Personal</span>
</div>
</div>
</div>
</main>
</body></html>
